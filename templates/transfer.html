{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h2>Send Money</h2>
  <p class="muted">Select source account and verified beneficiary.</p>
  <form method="post">
    <select name="from_account_id" required>
      <option value="">From account</option>
      {% for a in accounts %}
      <option value="{{ a.account_id }}">{{ a.account_number }} ({{ a.balance }})</option>
      {% endfor %}
    </select>
    <select name="beneficiary_id" required>
      <option value="">To beneficiary</option>
      {% for b in beneficiaries %}
      <option value="{{ b.beneficiary_id }}">{{ b.beneficiary_name }} - {{ b.beneficiary_account_no }}</option>
      {% endfor %}
    </select>
    <input name="amount" type="number" step="0.01" min="0.01" placeholder="Amount" required>
    <button type="submit">Transfer</button>
  </form>
</section>
{% endblock %}
