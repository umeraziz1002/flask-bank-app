{% extends "base.html" %}
{% block content %}
<section class="panel auth">
  <h2>Welcome Back</h2>
  <p class="muted">Sign in to access account balances and transactions.</p>
  <form method="post">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p class="muted">New user? <a href="{{ url_for('register') }}">Create account</a></p>
</section>
{% endblock %}
