{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h2>Balance Snapshot</h2>
  <div class="table-wrap">
    <table>
      <tr><th>Account No</th><th>Type</th><th>Balance</th></tr>
      {% for a in accounts %}
      <tr><td>{{ a.account_number }}</td><td>{{ a.account_type }}</td><td>{{ a.balance }} {{ a.currency_code }}</td></tr>
      {% endfor %}
    </table>
  </div>
</section>
{% endblock %}
