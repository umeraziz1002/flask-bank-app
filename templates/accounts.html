{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h2>Open New Account</h2>
  <form method="post">
    <select name="account_type" required>
      <option value="savings">Savings</option>
      <option value="current">Current</option>
    </select>
    <button type="submit">Create Account</button>
  </form>
</section>

<section class="panel">
  <h3>Existing Accounts</h3>
  <div class="table-wrap">
    <table>
      <tr><th>ID</th><th>Account No</th><th>Type</th><th>Status</th><th>Balance</th></tr>
      {% for a in accounts %}
      <tr>
        <td>{{ a.account_id }}</td>
        <td>{{ a.account_number }}</td>
        <td>{{ a.account_type }}</td>
        <td>{{ a.status }}</td>
        <td>{{ a.balance }} {{ a.currency_code }}</td>
      </tr>
      {% endfor %}
    </table>
  </div>
</section>
{% endblock %}
